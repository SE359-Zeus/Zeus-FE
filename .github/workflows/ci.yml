name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: TypeCheck
        run: bunx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Next.js (standalone)
        run: bun run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://zeus.ryanandexen.qzz.io/api/v1

      - name: Verify standalone output
        run: |
          test -f .next/standalone/server.js || { echo "Missing standalone server.js"; exit 1; }
          test -d .next/standalone/.next/static || { echo "Missing static assets"; exit 1; }
          test -d .next/standalone/public || { echo "Missing public assets"; exit 1; }

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: zeus-fe:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container starts
        run: |
          docker run -d --name zeus-fe-ci -p 3003:3000 zeus-fe-ci
          sleep 5
          curl -f http://localhost:3003 || { docker logs zeus-fe-ci; exit 1; }
          docker stop zeus-fe-ci
